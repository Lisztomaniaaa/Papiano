<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Blocked Account Popup Preview</title>
<style>
:root {
  --bg: #e7f4ff;
  --ink: #06111f;
  --danger: #b91c1c;
  --danger-soft: #fee2e2;
  --blue: #005bff;
  --discord: #5865f2;
}

* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
  -webkit-tap-highlight-color: transparent;
}

body {
  min-height: 100vh;
  min-height: 100dvh;
  display: grid;
  place-items: center;
  padding: 20px;
  background: var(--bg);
  color: var(--ink);
  font-family: -apple-system, BlinkMacSystemFont, "Inter", "Plus Jakarta Sans", sans-serif;
}

.demo-page {
  width: min(460px, 100%);
  display: grid;
  gap: 16px;
  text-align: center;
}

.demo-title {
  font-size: 32px;
  font-weight: 950;
  letter-spacing: -0.06em;
}

.demo-text {
  font-size: 14px;
  font-weight: 750;
  color: rgba(6, 17, 31, 0.62);
  line-height: 1.45;
}

.demo-button {
  width: max-content;
  min-width: 170px;
  min-height: 48px;
  justify-self: center;
  border: 1px solid var(--ink);
  border-radius: 999px;
  background: var(--blue);
  color: #fff;
  font: 900 13px/1 -apple-system, BlinkMacSystemFont, "Inter", sans-serif;
  text-transform: uppercase;
  cursor: pointer;
  box-shadow:
    inset 0 2px 0 rgba(255,255,255,.18),
    inset 0 -4px 0 rgba(0,38,132,.34),
    0 4px 0 #00358f,
    0 12px 22px rgba(0,91,255,.18);
}

.demo-button:active {
  transform: translateY(3px);
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,.14),
    inset 0 -2px 0 rgba(0,38,132,.34),
    0 1px 0 #00358f,
    0 8px 16px rgba(0,91,255,.16);
}

.account-restriction-overlay {
  position: fixed;
  inset: 0;
  z-index: 50;
  display: none;
  align-items: center;
  justify-content: center;
  padding: 22px;
  background: rgba(6, 17, 31, 0.68);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
}

.account-restriction-overlay.active {
  display: flex;
}

.account-restriction-card {
  width: min(100%, 410px);
  border-radius: 26px;
  background: #fff;
  color: var(--ink);
  padding: 22px;
  display: grid;
  gap: 15px;
  border: 1px solid rgba(255,255,255,.84);
  box-shadow: 0 28px 70px rgba(6,17,31,.38);
  animation: popupIn .28s cubic-bezier(.32,.72,0,1) both;
}

.account-restriction-icon {
  width: 56px;
  height: 56px;
  border-radius: 19px;
  background: var(--danger-soft);
  color: var(--danger);
  display: inline-flex;
  align-items: center;
  justify-content: center;
}

.account-restriction-icon svg {
  width: 31px;
  height: 31px;
  fill: currentColor;
}

.account-restriction-title {
  font-size: 25px;
  font-weight: 950;
  line-height: 1.04;
  letter-spacing: -0.045em;
}

.account-restriction-text {
  font-size: 14px;
  line-height: 1.5;
  font-weight: 750;
  color: rgba(6,17,31,.72);
}

.account-restriction-appeal {
  border: 1px solid rgba(6,17,31,.14);
  border-radius: 18px;
  background: #f8fafc;
  padding: 13px 14px;
  font-size: 12.8px;
  line-height: 1.45;
  font-weight: 800;
  color: rgba(6,17,31,.70);
}

.account-restriction-actions {
  display: grid;
  grid-template-columns: 1fr;
  gap: 10px;
}

.account-restriction-action {
  min-height: 48px;
  border-radius: 999px;
  border: none;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  text-decoration: none;
  font: 900 13px/1 -apple-system, BlinkMacSystemFont, "Inter", sans-serif;
  text-transform: uppercase;
  cursor: pointer;
}

.account-restriction-action.is-primary {
  background: var(--discord);
  color: #fff;
}

.account-restriction-action.is-secondary {
  background: #e2e8f0;
  color: var(--ink);
}

@keyframes popupIn {
  from {
    opacity: 0;
    transform: translateY(14px) scale(.97);
  }
  to {
    opacity: 1;
    transform: translateY(0) scale(1);
  }
}

@media (min-width: 520px) {
  .account-restriction-actions {
    grid-template-columns: 1fr 1fr;
  }
}
</style>
</head>
<body>
<main class="demo-page">
  <h1 class="demo-title">Popup Preview</h1>
  <p class="demo-text">Klik tombol ini buat lihat modal account restriction seperti di Papiano.</p>
  <button class="demo-button" type="button" onclick="openModal()">Open Popup</button>
</main>

<div class="account-restriction-overlay active" id="accountRestrictionOverlay" aria-hidden="false">
  <section class="account-restriction-card" role="alertdialog" aria-modal="true">
    <div class="account-restriction-icon" aria-hidden="true">
      <svg viewBox="0 0 24 24">
        <path d="M12 2a10 10 0 1 0 0 20 10 10 0 0 0 0-20Zm0 2a8 8 0 0 1 5.29 14L6 6.71A7.97 7.97 0 0 1 12 4ZM4 12c0-1.78.58-3.42 1.56-4.75l11.19 11.19A7.97 7.97 0 0 1 4 12Z"/>
      </svg>
    </div>

    <h2 class="account-restriction-title">Account permanently blocked</h2>

    <p class="account-restriction-text">
      Your account has been permanently blocked from Papiano online features.
    </p>

    <div class="account-restriction-appeal">
      If you believe this is a mistake, contact us on Discord to submit an appeal.
    </div>

    <div class="account-restriction-actions">
      <a class="account-restriction-action is-primary" href="https://discord.gg/v2UeWWc92U" target="_blank" rel="noopener">Appeal on Discord</a>
      <button class="account-restriction-action is-secondary" type="button" onclick="closeModal()">Close</button>
    </div>
  </section>
</div>

<script>
const overlay = document.getElementById('accountRestrictionOverlay');

function openModal() {
  overlay.classList.add('active');
  overlay.setAttribute('aria-hidden', 'false');
}

function closeModal() {
  overlay.classList.remove('active');
  overlay.setAttribute('aria-hidden', 'true');
}
</script>
</body>
</html>
