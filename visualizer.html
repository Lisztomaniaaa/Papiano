<link rel="stylesheet" href="/css/visualizer/piano.css">

<body>

<div id="toastWrap"></div>

<div class="viz-home">
    <div class="viz-home-card">
        <div class="viz-home-title">Piano Visualizer</div>
        <div class="viz-home-subtitle">Load a MIDI file or paste a link to start</div>

        <!-- Paste Link -->
        <div class="viz-input-group">
            <label class="viz-input-label" for="vizLinkInput">Paste YouTube / TikTok Link</label>
            <input class="viz-input" type="url" id="vizLinkInput" placeholder="https://youtube.com/watch?v=..." autocomplete="off" autocorrect="off" spellcheck="false">
        </div>

        <!-- Divider -->
        <div class="viz-divider"><span>or</span></div>

        <!-- Upload MIDI / Video -->
        <div class="viz-input-group">
            <label class="viz-input-label">Upload MIDI / Video</label>
            <div class="viz-upload-area" id="vizUploadArea">
                <div class="viz-upload-icon">&#9835;</div>
                <div class="viz-upload-text">Drop a MIDI or video file here</div>
                <div class="viz-upload-hint">.mid .midi .mp4 .webm .mov</div>
                <input type="file" id="vizFileInput" accept=".mid,.midi,.mp4,.webm,.mov,.avi,.mkv,audio/midi,video/*">
            </div>
            <div class="viz-file-chip" id="vizFileChip">
                <span class="viz-file-name" id="vizFileName"></span>
                <button class="viz-file-remove" id="vizFileRemove" type="button">&times;</button>
            </div>
        </div>

        <!-- Start Button -->
        <button class="viz-start-btn" id="vizStartBtn" type="button" disabled>Start Play</button>

        <!-- Back Link -->
        <a class="viz-back-link" href="/">&#8592; Back to Home</a>
    </div>
</div>

<script src="/js/visualizer/home.js"></script>
</body>
</html>
