<link rel="manifest" href="/manifest.json">

<link rel="stylesheet" href="/css/visualizer/piano.css">
</head>
<body class="render-fixed visualizer-mode">

<div id="loadingScreen" aria-hidden="true" style="display:none;">
    <div class="ld-card">
        <div class="ld-main-label">Loading Visualizer</div>
        <div class="ld-bar-track ld-single-track"><div class="ld-bar-fill" id="ldBar1"></div></div>
    </div>
</div>

<div id="app" class="fade-in">
    <div id="toastWrap"></div>

    <!-- Logo / Toggle UI -->
    <div id="logoToggle" aria-label="Toggle UI">
        <span class="brand-icon"><img src="https://i.supaimg.com/ccbdf613-56b4-4d2a-9880-d6d18769c2bf/221fc050-b7ea-451e-835d-ee82b7492a06.webp" alt="Papiano logo"></span>
        <span class="brand-text">PAPIANO</span>
    </div>

    <!-- Top Bar -->
    <div class="top" id="topNav">
        <div id="panel">
            <button id="fsBtn" class="btn" title="Fullscreen">Fullscreen</button>
            <button class="btn" id="sfBtn">SoundFont</button>
            <a class="btn" href="/visualizer.html" style="text-decoration:none;">Load MIDI</a>

            <!-- MIDI Playback Controls (shown when MIDI is loaded) -->
            <div id="vizMidiControls">
                <button class="btn" id="vizPlayBtn">&#9654; Play</button>
                <button class="btn" id="vizPauseBtn">&#10074;&#10074; Pause</button>
                <button class="btn" id="vizStopBtn">&#9632; Stop</button>
                <span id="vizMidiProgress">0:00 / 0:00</span>
            </div>
        </div>
    </div>

    <!-- Stage (Falling Notes) -->
    <div class="stage" id="stageArea">
        <canvas id="fx"></canvas>
        <div id="saberLine"></div>
        <div id="chordDisplay">
            <div class="chord-name primary" id="chordPrimary"></div>
            <div class="chord-name secondary" id="chordSecondary"></div>
        </div>
    </div>

    <!-- Piano Keyboard -->
    <div id="pianoWrap">
        <div id="pianoViewport">
            <div id="piano"></div>
        </div>
    </div>

    <!-- SoundFont Boot Chip -->
    <div id="bootSfChip" aria-live="polite">
        <div class="bsc-spinner"><i></i><i></i><b></b></div>
        <span class="bsc-text" id="bootSfChipText">Loading sound</span>
        <div class="bsc-bar"><i id="bootSfChipBar"></i></div>
    </div>
</div>

<script src="/js/visualizer/piano.js"></script>
</body>
</html>
